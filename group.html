<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Raleway:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header-group">
        <div class="title-div header">
            <h1 class="title">Espanhol</h1>
        </div>
        <div class="header">
            <a href="index.html"><img src="assets/back.svg"></a>
        </div>
    </div>
    <div class="content">
        <div class="card-wrapper">
            <div class="card">
                <p class="text-card" id="text-card">Husmeada</p>
            </div>
            <div class="next-card">
                <p>> Próximo card</p>
            </div>
        </div>

        <div id="button-answer" style="cursor: pointer;">
            <p id="button-text">Ver resposta</p>
        </div>
        <div class="container">
            <div class="button-idk item">Não sei</div>
            <div class="input-div item">
                <input type="text" name="answer" placeholder="Resposta">
            </div>
            <button class="button-send item">Enviar</button>
        </div>
        <div class="pontuacao">
            <p id="nao-sabe">Nao sabe: 0</p>
            <p id="acertos">Acertos: 0</p>
            <p id="erros">Erros: 0</p>
        </div>
    </div>


    <script src="script.js">
    </script>
</body>

</html>
